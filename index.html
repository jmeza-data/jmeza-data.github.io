/* ════════════════ RESET & TOKENS ════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f4ef;--bg2:#ffffff;--bg3:#eeede8;--bg-dark:#181818;
  --text:#161616;--muted:#636363;--subtle:#999;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);
  --green:#16a34a;--green-bg:rgba(22,163,74,0.07);--green-br:rgba(22,163,74,0.18);
  --tag-bg:rgba(0,0,0,0.045);--tag-br:rgba(0,0,0,0.09);--tag-text:#3a3a3a;
  --r:10px;--r2:18px;--r3:24px;
  --section-pad:96px;--content-max:1080px;--gutter:48px;
  --ease:cubic-bezier(0.25,0.46,0.45,0.94);
}
html{scroll-behavior:smooth;font-size:16px}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--text);overflow-x:hidden;
  line-height:1.6;-webkit-font-smoothing:antialiased;
}
.skip-link{
  position:absolute;top:-100%;left:16px;background:var(--text);color:var(--bg);
  padding:8px 16px;border-radius:0 0 var(--r) var(--r);
  font-size:13px;font-weight:500;text-decoration:none;z-index:1000;
}
.skip-link:focus{top:0}
:focus-visible{outline:2px solid var(--text);outline-offset:3px;border-radius:4px}

/* ════════════════ SCROLL BAR ════════════════ */
#scrollBar{
  position:fixed;top:0;left:0;height:2px;z-index:300;
  background:var(--text);width:0%;transition:width 0.1s linear;
  pointer-events:none;
}

/* ════════════════ NAV ════════════════ */
.site-nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 var(--gutter);height:56px;
  background:rgba(244,244,239,0.86);
  backdrop-filter:blur(18px) saturate(150%);
  -webkit-backdrop-filter:blur(18px) saturate(150%);
  border-bottom:1px solid var(--border);
}
.nav-logo{
  font-family:'Syne',sans-serif;font-size:15px;font-weight:700;
  color:var(--text);text-decoration:none;letter-spacing:-0.03em;
  display:flex;align-items:center;gap:8px;
}
.nav-dot{
  width:6px;height:6px;background:var(--green);border-radius:50%;
  animation:pulse 2.6s ease infinite;flex-shrink:0;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.35;transform:scale(1.7)}}
.nav-links{display:flex;align-items:center;gap:26px;list-style:none}
.nav-links a{
  font-size:13px;color:var(--muted);text-decoration:none;
  font-weight:400;transition:color 0.18s;letter-spacing:0.01em;
}
.nav-links a:hover{color:var(--text)}
.lang-toggle{
  display:flex;align-items:center;gap:2px;
  background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:3px;
}
.lang-btn{
  font-size:11px;font-family:'JetBrains Mono',monospace;font-weight:500;
  padding:4px 11px;border-radius:14px;border:none;cursor:pointer;
  background:transparent;color:var(--muted);transition:background 0.18s,color 0.18s;line-height:1;
}
.lang-btn.active{background:var(--text);color:var(--bg)}
.lang-btn:hover:not(.active){color:var(--text)}

/* ════════════════ HERO ════════════════ */
#hero{min-height:100vh;display:flex;align-items:center;padding:100px var(--gutter) 80px}
.hero-inner{
  max-width:var(--content-max);margin:0 auto;width:100%;
  display:grid;grid-template-columns:1fr 240px;gap:72px;align-items:center;
}
.hero-text{min-width:0}
.hero-status{
  display:inline-flex;align-items:center;gap:7px;
  font-size:11.5px;font-family:'JetBrains Mono',monospace;
  color:var(--green);background:var(--green-bg);
  border:1px solid var(--green-br);padding:5px 13px;border-radius:20px;margin-bottom:24px;
  opacity:0;animation:fadeUp 0.55s 0.08s var(--ease) forwards;
}
.hero-status::before{
  content:'';width:5px;height:5px;background:var(--green);
  border-radius:50%;animation:pulse 1.9s ease infinite;flex-shrink:0;
}
h1.hero-name{
  font-family:'Syne',sans-serif;
  font-size:clamp(52px,7.5vw,92px);
  font-weight:800;line-height:0.93;letter-spacing:-0.05em;color:var(--text);
  margin-bottom:20px;opacity:0;animation:fadeUp 0.55s 0.16s var(--ease) forwards;
}
.hero-rule{
  display:block;width:40px;height:2px;background:var(--text);
  margin-bottom:20px;border-radius:2px;
  opacity:0;animation:fadeUp 0.55s 0.24s var(--ease) forwards;
}
.hero-sub{
  font-size:14px;font-weight:400;color:var(--muted);letter-spacing:0.01em;
  margin-bottom:24px;opacity:0;animation:fadeUp 0.55s 0.3s var(--ease) forwards;
}
.hero-bio{
  font-size:16px;font-weight:300;color:var(--muted);
  line-height:1.8;margin-bottom:40px;max-width:480px;
  opacity:0;animation:fadeUp 0.55s 0.36s var(--ease) forwards;
}
.hero-bio strong{color:var(--text);font-weight:500}
.hero-ctas{
  display:flex;gap:10px;flex-wrap:wrap;
  opacity:0;animation:fadeUp 0.55s 0.44s var(--ease) forwards;
}
.btn{
  display:inline-flex;align-items:center;gap:6px;
  font-size:13.5px;font-weight:500;font-family:'Inter',sans-serif;
  text-decoration:none;padding:11px 22px;border-radius:980px;
  border:1.5px solid transparent;cursor:pointer;
  transition:transform 0.18s var(--ease),box-shadow 0.18s,background 0.18s,border-color 0.18s;
  letter-spacing:-0.01em;
}
.btn-primary{background:var(--text);color:var(--bg);border-color:var(--text)}
.btn-primary:hover{background:var(--bg-dark);border-color:var(--bg-dark);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.16)}
.btn-outline{background:transparent;color:var(--text);border-color:var(--border2)}
.btn-outline:hover{border-color:var(--text);background:rgba(0,0,0,0.04);transform:translateY(-2px)}

/* Foto */
.hero-photo-col{
  display:flex;flex-direction:column;align-items:center;gap:18px;
  opacity:0;animation:fadeUp 0.55s 0.5s var(--ease) forwards;
}
.photo-frame{
  width:210px;height:210px;border-radius:50%;padding:2px;
  background:linear-gradient(150deg,#d0cfc8,#e8e7e0,#b0afa8);flex-shrink:0;
}
.photo-inner{
  width:100%;height:100%;border-radius:50%;background:var(--bg3);overflow:hidden;
  display:flex;align-items:center;justify-content:center;border:3px solid var(--bg);
  font-family:'Syne',sans-serif;font-size:36px;font-weight:700;
  color:var(--muted);letter-spacing:-0.02em;
}
.photo-inner img{width:100%;height:100%;object-fit:cover;object-position:center top}
.photo-badges{display:flex;gap:7px;flex-wrap:wrap;justify-content:center}
.photo-badge{
  font-size:11px;font-family:'JetBrains Mono',monospace;
  padding:4px 10px;border-radius:20px;
  background:var(--bg2);border:1px solid var(--border2);color:var(--muted);
}
.photo-badge.available{color:var(--green);background:var(--green-bg);border-color:var(--green-br)}

/* ════════════════ STATS BAR ════════════════ */
.stats-bar{background:var(--bg-dark)}
.stats-inner{
  max-width:var(--content-max);margin:0 auto;
  display:grid;grid-template-columns:repeat(4,1fr);
}
.stat-cell{
  padding:36px 20px;text-align:center;
  border-right:1px solid rgba(255,255,255,0.06);transition:background 0.2s;
}
.stat-cell:last-child{border-right:none}
.stat-cell:hover{background:rgba(255,255,255,0.025)}
.stat-num{
  font-family:'Syne',sans-serif;font-size:42px;font-weight:800;
  letter-spacing:-0.05em;color:#fff;line-height:1;margin-bottom:7px;display:block;
}
.stat-label{
  font-size:10.5px;color:rgba(255,255,255,0.35);
  font-family:'JetBrains Mono',monospace;letter-spacing:0.07em;text-transform:uppercase;
}

/* ════════════════ LAYOUT ════════════════ */
.container{max-width:var(--content-max);margin:0 auto;padding:0 var(--gutter)}
.section{padding:var(--section-pad) 0}
.bg-alt{background:var(--bg3)}
.sep{height:1px;background:var(--border)}
.sec-label{
  font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:500;
  letter-spacing:0.11em;text-transform:uppercase;color:var(--subtle);
  margin-bottom:10px;display:block;
}
.sec-title{
  font-family:'Syne',sans-serif;font-size:clamp(32px,4vw,50px);
  font-weight:800;letter-spacing:-0.04em;line-height:1.06;color:var(--text);margin-bottom:12px;
}
.sec-sub{
  font-size:15px;font-weight:300;color:var(--muted);
  max-width:460px;line-height:1.75;margin-bottom:48px;
}

/* ════════════════ PROJECTS ════════════════ */
.projects-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.projects-grid+.projects-grid{margin-top:14px}
.proj-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);
  padding:28px;cursor:pointer;
  transition:transform 0.22s var(--ease),border-color 0.22s,box-shadow 0.22s;
  display:flex;flex-direction:column;min-height:240px;position:relative;overflow:hidden;
}
.proj-card:hover{transform:translateY(-4px);border-color:var(--border2);box-shadow:0 14px 40px rgba(0,0,0,0.08)}
.proj-card:focus-visible{outline:2px solid var(--text);outline-offset:3px}
.proj-card.is-featured{
  grid-column:1/-1;flex-direction:row;align-items:center;
  gap:36px;min-height:200px;
  background:var(--bg-dark);border-color:rgba(255,255,255,0.07);
}
.proj-card.is-featured:hover{box-shadow:0 18px 56px rgba(0,0,0,0.22);border-color:rgba(255,255,255,0.13)}
.proj-card.is-featured .proj-category{background:rgba(255,255,255,0.09);color:rgba(255,255,255,0.55);border-color:rgba(255,255,255,0.1)}
.proj-card.is-featured .proj-title{color:#fff}
.proj-card.is-featured .proj-desc{color:rgba(255,255,255,0.5)}
.proj-card.is-featured .stack-pill{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5);border-color:rgba(255,255,255,0.09)}
.proj-card.is-featured .link-arrow{color:rgba(255,255,255,0.65)}
.proj-card.is-featured .link-arrow:hover{color:#fff}
.proj-visual{
  flex-shrink:0;border-radius:var(--r);overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.proj-visual img{width:100%;height:100%;object-fit:cover;display:block}
.proj-visual.fallback{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);font-size:40px}
.is-featured .proj-visual{width:148px;height:112px}
.proj-card:not(.is-featured) .proj-visual{
  width:100%;height:130px;margin-bottom:20px;
  background:var(--bg3);border:1px solid var(--border);
}
.proj-card:not(.is-featured) .proj-visual.fallback{background:var(--bg3);border:1px solid var(--border);font-size:36px}
.proj-body{flex:1;display:flex;flex-direction:column;min-width:0}
.proj-category{
  display:inline-flex;align-items:center;
  font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:500;
  letter-spacing:0.08em;text-transform:uppercase;
  background:var(--tag-bg);color:var(--subtle);
  padding:3px 9px;border-radius:20px;margin-bottom:12px;
  border:1px solid var(--tag-br);width:fit-content;
}
.proj-metric{
  display:inline-flex;align-items:center;
  font-family:'JetBrains Mono',monospace;font-size:10.5px;
  color:var(--green);background:var(--green-bg);
  padding:3px 9px;border-radius:20px;border:1px solid var(--green-br);
  margin-bottom:10px;width:fit-content;
}
.proj-title{
  font-family:'Syne',sans-serif;font-size:17px;font-weight:700;
  letter-spacing:-0.025em;color:var(--text);margin-bottom:8px;line-height:1.2;
}
.proj-desc{font-size:13px;font-weight:300;color:var(--muted);line-height:1.65;margin-bottom:16px;flex:1}
.proj-stack{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px}
.stack-pill{
  font-family:'JetBrains Mono',monospace;font-size:9.5px;
  padding:3px 8px;border-radius:20px;
  background:var(--tag-bg);color:var(--muted);border:1px solid var(--tag-br);
}
.proj-footer{display:flex;align-items:center;gap:12px;margin-top:auto}
.link-arrow{
  font-size:12.5px;font-weight:500;color:var(--muted);text-decoration:none;
  display:inline-flex;align-items:center;gap:4px;transition:color 0.18s,gap 0.18s;
}
.link-arrow:hover{color:var(--text);gap:8px}
.demo-btn{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11.5px;font-weight:500;color:var(--green);
  background:var(--green-bg);padding:4px 11px;border-radius:20px;
  border:1px solid var(--green-br);text-decoration:none;
  transition:background 0.18s,border-color 0.18s;
}
.demo-btn::before{content:'●';font-size:7px}
.demo-btn:hover{background:rgba(22,163,74,0.13);border-color:rgba(22,163,74,0.3)}
.gh-status{
  margin-top:28px;font-size:11px;
  font-family:'JetBrains Mono',monospace;color:var(--subtle);text-align:center;min-height:18px;
}
.more-heading{
  font-family:'Syne',sans-serif;font-size:14px;font-weight:600;
  color:var(--muted);letter-spacing:-0.02em;
  margin:36px 0 14px;padding-top:28px;border-top:1px solid var(--border);
}

/* ════════════════ SKILLS ════════════════ */
.skills-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.skill-card{
  padding:24px;border:1px solid var(--border);border-radius:var(--r2);
  background:var(--bg2);transition:border-color 0.22s,transform 0.22s;
}
.skill-card:hover{border-color:var(--border2);transform:translateY(-3px)}
.skill-icon{font-size:20px;margin-bottom:12px;display:block}
.skill-name{
  font-family:'Syne',sans-serif;font-size:13.5px;font-weight:700;
  color:var(--text);margin-bottom:12px;letter-spacing:-0.02em;
}
.skill-tags{display:flex;flex-wrap:wrap;gap:5px}
.skill-tag{
  font-family:'JetBrains Mono',monospace;font-size:9.5px;
  padding:3px 8px;border-radius:20px;
  background:var(--tag-bg);color:var(--muted);border:1px solid var(--tag-br);
  transition:color 0.18s,border-color 0.18s;
}
.skill-card:hover .skill-tag{color:var(--tag-text);border-color:var(--border2)}

/* ════════════════ EXPERIENCE ════════════════ */
.exp-list{display:flex;flex-direction:column}
.exp-item{
  display:grid;grid-template-columns:180px 1fr;gap:44px;
  padding:40px 0;border-bottom:1px solid var(--border);
}
.exp-item:first-child{padding-top:0}
.exp-item:last-child{border-bottom:none;padding-bottom:0}
.exp-date{
  font-family:'JetBrains Mono',monospace;font-size:10.5px;
  color:var(--subtle);padding-top:3px;letter-spacing:0.04em;line-height:1.8;
}
.exp-now{
  display:inline-block;font-size:9.5px;
  background:var(--green-bg);color:var(--green);
  border:1px solid var(--green-br);padding:2px 7px;border-radius:20px;margin-top:5px;
}
.exp-role{
  font-family:'Syne',sans-serif;font-size:17px;font-weight:700;
  color:var(--text);margin-bottom:2px;letter-spacing:-0.025em;
}
.exp-co{font-size:12.5px;color:var(--muted);margin-bottom:13px}
.exp-list-items{list-style:none;padding:0;margin-bottom:14px}
.exp-list-items li{
  font-size:13.5px;font-weight:300;color:var(--muted);
  line-height:1.7;margin-bottom:5px;padding-left:14px;position:relative;
}
.exp-list-items li::before{content:'—';position:absolute;left:0;color:rgba(0,0,0,0.2);font-size:11px}
.exp-tags{display:flex;flex-wrap:wrap;gap:5px}
.exp-tag{
  font-family:'JetBrains Mono',monospace;font-size:9.5px;
  padding:3px 8px;border-radius:20px;
  background:var(--tag-bg);color:var(--subtle);border:1px solid var(--tag-br);
}

/* ════════════════ CERTIFICATIONS ════════════════ */
.cert-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.cert-card{
  display:flex;align-items:center;gap:14px;
  padding:16px 20px;background:var(--bg2);
  border:1px solid var(--border);border-radius:var(--r);
  transition:border-color 0.22s,transform 0.2s;
}
.cert-card:hover{border-color:var(--border2);transform:translateX(3px)}
.cert-year{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--subtle);min-width:30px}
.cert-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:1px}
.cert-inst{font-size:11.5px;color:var(--subtle)}

/* ════════════════ ABOUT ════════════════ */
.about-grid{display:grid;grid-template-columns:1fr 340px;gap:72px;align-items:start}
.about-text p{font-size:15px;font-weight:300;color:var(--muted);line-height:1.85;margin-bottom:16px}
.about-text p:last-child{margin-bottom:0}
.about-text strong{color:var(--text);font-weight:500}
.about-sidebar{display:flex;flex-direction:column}
.detail-row{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:12px 0;border-bottom:1px solid var(--border);gap:16px;
}
.detail-row:last-child{border-bottom:none}
.detail-key{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  color:var(--subtle);letter-spacing:0.09em;text-transform:uppercase;flex-shrink:0;
}
.detail-val{font-size:13px;color:var(--text);text-align:right}
.detail-val a{color:var(--muted);text-decoration:none;transition:color 0.18s}
.detail-val a:hover{color:var(--text)}
.detail-val.is-green{color:var(--green);font-weight:500}
.lang-section{margin-top:28px}
.lang-label{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  letter-spacing:0.1em;text-transform:uppercase;color:var(--subtle);
  margin-bottom:14px;display:block;
}
.lang-rows{display:flex;flex-direction:column;gap:11px}
.lang-row{display:flex;align-items:center;gap:10px}
.lang-name{font-size:12.5px;color:var(--muted);min-width:68px}
.lang-track{flex:1;height:2px;background:var(--border2);border-radius:2px;overflow:hidden}
.lang-fill{
  height:100%;border-radius:2px;background:var(--text);width:0;
  transition:width 1.1s cubic-bezier(0.4,0,0.2,1);
}
.lang-level{font-size:10.5px;font-family:'JetBrains Mono',monospace;color:var(--subtle);min-width:22px;text-align:right}

/* ════════════════ CONTACT ════════════════ */
.contact-section{
  background:var(--bg-dark);padding:var(--section-pad) var(--gutter);text-align:center;
}
.contact-section .sec-label{color:rgba(255,255,255,0.25)}
.contact-section .sec-title{color:#fff}
.contact-section .sec-sub{color:rgba(255,255,255,0.4);margin:0 auto 48px}
.contact-grid{
  max-width:720px;margin:0 auto;
  display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
}
.contact-card{
  display:flex;flex-direction:column;align-items:center;gap:9px;
  padding:24px 14px;background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.07);border-radius:var(--r2);
  text-decoration:none;color:inherit;
  transition:border-color 0.22s,background 0.22s,transform 0.22s;
}
.contact-card:hover{border-color:rgba(255,255,255,0.16);background:rgba(255,255,255,0.06);transform:translateY(-4px)}
.contact-card:focus-visible{outline:2px solid rgba(255,255,255,0.5);outline-offset:3px}
.c-icon{font-size:18px}
.c-label{
  font-size:9.5px;font-family:'JetBrains Mono',monospace;
  letter-spacing:0.09em;text-transform:uppercase;color:rgba(255,255,255,0.3);
}
.c-val{font-size:12px;color:rgba(255,255,255,0.75);text-align:center;word-break:break-all}

/* ════════════════ FOOTER ════════════════ */
.site-footer{
  background:var(--bg-dark);padding:24px var(--gutter);
  border-top:1px solid rgba(255,255,255,0.05);
  display:flex;justify-content:space-between;align-items:center;
}
.site-footer p{font-size:11.5px;color:rgba(255,255,255,0.22)}
.site-footer a{font-size:11.5px;color:rgba(255,255,255,0.28);text-decoration:none;transition:color 0.18s}
.site-footer a:hover{color:rgba(255,255,255,0.6)}

/* ════════════════ ANIMATIONS ════════════════ */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.reveal{opacity:0;transform:translateY(20px);transition:opacity 0.55s var(--ease),transform 0.55s var(--ease)}
.reveal-x{opacity:0;transform:translateX(-18px);transition:opacity 0.55s var(--ease),transform 0.55s var(--ease)}
.reveal.in,.reveal-x.in{opacity:1;transform:none}

/* ════════════════ RESPONSIVE ════════════════ */
@media(max-width:900px){
  :root{--gutter:24px;--section-pad:72px}
  .skills-grid{grid-template-columns:repeat(2,1fr)}
  .about-grid{grid-template-columns:1fr;gap:48px}
}
@media(max-width:768px){
  .site-nav{padding:0 var(--gutter)}
  .nav-links{display:none}
  #hero{padding:92px var(--gutter) 64px}
  .hero-inner{grid-template-columns:1fr;gap:40px;text-align:center}
  .hero-text .hero-bio,.hero-text .hero-rule{margin-left:auto;margin-right:auto}
  .hero-ctas{justify-content:center}
  .hero-photo-col{order:-1}
  .photo-frame{width:160px;height:160px}
  .stats-inner{grid-template-columns:repeat(2,1fr)}
  .stat-cell{border-right:none;border-bottom:1px solid rgba(255,255,255,0.06);padding:24px 16px}
  .stat-cell:nth-child(2),.stat-cell:nth-child(4){border-bottom:none}
  .projects-grid{grid-template-columns:1fr}
  .proj-card.is-featured{flex-direction:column;gap:20px;min-height:auto}
  .is-featured .proj-visual{width:100%;height:100px}
  .skills-grid{grid-template-columns:1fr}
  .cert-grid{grid-template-columns:1fr}
  .exp-item{grid-template-columns:1fr;gap:6px}
  .contact-grid{grid-template-columns:repeat(2,1fr)}
  .site-footer{flex-direction:column;gap:8px;text-align:center}
}
@media(max-width:380px){
  .hero-ctas{flex-direction:column;align-items:center}
  .contact-grid{grid-template-columns:1fr 1fr}
}

/* ────────────────────────────────────────────────────
   HELPERS DE DOM
──────────────────────────────────────────────────── */
function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
}

function sect(id, bgClass = '') {

  return wrap;
}

/* ────────────────────────────────────────────────────
   SCROLL PROGRESS BAR
──────────────────────────────────────────────────── */
const scrollBar = document.getElementById('scrollBar');
window.addEventListener('scroll', () => {
  const max = document.body.scrollHeight - window.innerHeight;
  scrollBar.style.width = (max > 0 ? (window.scrollY / max) * 100 : 0) + '%';
}, { passive: true });

/* ────────────────────────────────────────────────────
   SCROLL REVEAL
──────────────────────────────────────────────────── */
const revealObs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) { e.target.classList.add('in'); revealObs.unobserve(e.target); }
  });
}, { threshold: 0.08, rootMargin: '0px 0px -28px 0px' });

function observeAll(root = document) {
  root.querySelectorAll('.reveal, .reveal-x').forEach(e => revealObs.observe(e));
}

function stagger(grid) {
  grid.querySelectorAll('.reveal').forEach((e, i) => { e.style.transitionDelay = (i * 0.07) + 's'; });
}

/* ────────────────────────────────────────────────────
   CONTADORES
──────────────────────────────────────────────────── */
const counterObs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (!e.isIntersecting) return;
    const el = e.target, target = +el.dataset.target, suffix = el.dataset.suffix || '+';
    let cur = 0;
    const steps = 55, inc = target / steps;
    const timer = setInterval(() => {
      cur = Math.min(cur + inc, target);
      el.textContent = Math.floor(cur) + suffix;
      if (cur >= target) clearInterval(timer);
    }, 1200 / steps);
    counterObs.unobserve(el);
  });
}, { threshold: 0.6 });

/* ────────────────────────────────────────────────────
   BARRAS DE IDIOMA
──────────────────────────────────────────────────── */
const langBarObs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (!e.isIntersecting) return;
    e.target.querySelectorAll('.lang-fill').forEach(b => {
      setTimeout(() => { b.style.width = b.dataset.w + '%'; }, 120);
    });
    langBarObs.unobserve(e.target);
  });
}, { threshold: 0.3 });

──────────────────────────────────────────────────── */
function createVisual(meta, isFeatured) {
  const wrap = document.createElement('div');
  wrap.className = 'proj-visual';
  const img = document.createElement('img');
  img.alt = meta.title_es || meta.repo || '';
  img.onerror = () => {
    wrap.classList.add('fallback');
    wrap.textContent = meta.emoji || '💻';
    img.remove();
  };
  img.src = meta.image || `images/projects/${meta.repo || meta.name}.jpg`;
  wrap.appendChild(img);
  return wrap;
}

/* ────────────────────────────────────────────────────
   PROYECTOS — render de una tarjeta
──────────────────────────────────────────────────── */
function formatName(str) {
  return (str || '').replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function createCard(meta, isFeatured) {
  const card = document.createElement('div');
  card.className = 'proj-card reveal' + (isFeatured ? ' is-featured' : '');
  card.setAttribute('role', 'listitem');
  card.setAttribute('tabindex', '0');

  const title = (lang === 'en' ? meta.title_en : meta.title_es) || formatName(meta.repo || meta.name);
  const desc  = (lang === 'en' ? meta.desc_en  : meta.desc_es)  || meta.ghDesc || '';
  const tags  = (meta.tags && meta.tags.length) ? meta.tags : (meta.topics || []);
  const catLabel = isFeatured ? t('projects.featured') : tags.slice(0, 2).join(' · ') || (meta.language || '');

  const metricHtml = meta.metric ? `<div class="proj-metric">${meta.metric}</div>` : '';
  const demoHtml   = meta.demo
    ? `<a href="${meta.demo}" target="_blank" rel="noopener" class="demo-btn" aria-label="Demo: ${title}">${t('demo_btn')}</a>` : '';
  const stackHtml  = tags.length ? `<div class="proj-stack">${tags.map(t => `<span class="stack-pill">${t}</span>`).join('')}</div>` : '';

  const body = el('div', 'proj-body', `
    ${catLabel ? `<span class="proj-category">${catLabel}</span>` : ''}
    ${metricHtml}
    <h3 class="proj-title">${title}</h3>
    <p class="proj-desc">${desc}</p>
    ${stackHtml}
    <div class="proj-footer">
      <a href="${meta.url}" target="_blank" rel="noopener" class="link-arrow">${t('projects.code')}</a>
      ${demoHtml}
    </div>`);

  const visual = createVisual(meta);

  if (isFeatured) { card.appendChild(body); card.appendChild(visual); }
  else            { card.appendChild(visual); card.appendChild(body); }

  card.addEventListener('click', e => { if (e.target.closest('a')) return; window.open(meta.url, '_blank', 'noopener'); });
  card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); window.open(meta.url, '_blank', 'noopener'); } });

  return card;
}

function renderPinned() {
  const grid = document.getElementById('pinnedGrid');
  if (!grid) return;
  grid.innerHTML = '';

  Object.entries(PROJECT_META)
    .filter(([, m]) => !m.hidden && m.pinOrder)
    .sort(([, a], [, b]) => (a.pinOrder || 99) - (b.pinOrder || 99))
    .forEach(([repo, meta]) => {
      const merged = { ...meta, repo, name: repo, url: `https://github.com/${GITHUB_USER}/${repo}` };
      grid.appendChild(createCard(merged, !!meta.featured));
    });

  stagger(grid); observeAll(grid);

async function loadExtraFromGitHub() {
  const extra  = document.getElementById('extraGrid');
  const head   = document.getElementById('moreHeading');
  const status = document.getElementById('ghStatus');
  if (!extra) return;

  status.textContent = t('projects.gh_loading');
  try {
    const res = await fetch(`https://api.github.com/users/${GITHUB_USER}/repos?per_page=100&sort=updated`,
      { headers: { Accept: 'application/vnd.github.v3+json' } });
    if (!res.ok) throw new Error('API error');
    const repos = await res.json();

    const pinnedKeys = new Set(
      Object.entries(PROJECT_META).filter(([, m]) => m.pinOrder).map(([k]) => k.toLowerCase())
    );
    const extras = repos.filter(r => !r.fork && !pinnedKeys.has(r.name.toLowerCase()) && !PROJECT_META[r.name]?.hidden).slice(0, 6);

    extra.innerHTML = '';
    if (extras.length) {
      head.style.display = '';
      extras.forEach(r => {
        const ov = PROJECT_META[r.name] || {};
        const merged = { repo: r.name, name: r.name, url: r.html_url, ghDesc: r.description, language: r.language, topics: r.topics || [], ...ov };
        extra.appendChild(createCard(merged, false));
      });
      stagger(extra); observeAll(extra);
    }
    const date = new Date().toLocaleDateString(lang === 'en' ? 'en-US' : 'es-CO');
    status.textContent = `↻ ${lang === 'en' ? 'Synced from GitHub' : 'Sincronizado desde GitHub'} · ${repos.length} repos · ${date}`;
  } catch {
    status.textContent = t('projects.gh_error');
  }
}

  document.getElementById('metaDesc').content = `${PROFILE.name_full} — Data Scientist & ML Engineer. Portafolio de proyectos de ciencia de datos, machine learning y analítica.`;

  renderNav();
  renderHero();
  renderStats();
  renderProjectsShell();   /* crea el shell; luego renderPinned y loadExtraFromGitHub llenan los grids */
  renderSkills();
  renderExperience();
  renderCertifications();
  renderAbout();
  renderContact();
  renderFooter();

  observeAll();             /* observa todos los .reveal que existan en este momento */
}

function refreshContent() {
  /* Actualiza solo las partes que dependen del idioma,
     sin desmontar/remontar secciones (evita reflows grandes) */
  renderNav();
  renderHero();
  renderStats();
  renderProjectsShell();
  renderSkills();
  renderExperience();
  renderCertifications();
  renderAbout();
  renderContact();
  renderFooter();
  observeAll();
  renderPinned();
  loadExtraFromGitHub();
}

/* ────────────────────────────────────────────────────
   CAMBIO DE IDIOMA
──────────────────────────────────────────────────── */
function applyLang(l) {
  lang = l;
  document.documentElement.lang = l;
  document.getElementById('btn-es').classList.toggle('active', l === 'es');
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  document.getElementById('btn-es').setAttribute('aria-pressed', l === 'es');
  document.getElementById('btn-en').setAttribute('aria-pressed', l === 'en');
  refreshContent();
}

document.getElementById('btn-es').addEventListener('click', () => applyLang('es'));
document.getElementById('btn-en').addEventListener('click', () => applyLang('en'));

/* ────────────────────────────────────────────────────
   INIT
──────────────────────────────────────────────────── */
function detectLang() {
  return (navigator.language || 'es').toLowerCase().startsWith('es') ? 'es' : 'en';
}

lang = detectLang();
document.getElementById('btn-' + lang).classList.add('active');
document.getElementById('btn-' + lang).setAttribute('aria-pressed', 'true');

renderAll();
renderPinned();
loadExtraFromGitHub();
</script>
</body>
</html>
